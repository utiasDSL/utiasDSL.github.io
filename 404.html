<html>

<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // 1. Define your new organization's base URL
        var newOrgBase = "https://learnsyslab.github.io";

        // 2. Grab the exact path, query parameters, and hash the user tried to visit
        var path = window.location.pathname;
        var query = window.location.search;
        var hash = window.location.hash;

        // 3. Forward them to the exact same spot at the new organization
        window.location.replace(newOrgBase + path + query + hash);
    </script>
</head>

<body>
    <p>We have moved! Redirecting you to the new location...</p>
    <p>If you are not redirected automatically, <a href="https://learnsyslab.github.io/">click here</a>.</p>
</body>

</html>
